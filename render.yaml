services:
  # BACKEND SERVICE
  - type: web
    name: whygift-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 10000

  # FRONTEND SERVICE
  - type: static
    name: whygift-web
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: whygift-api
          type: web
          property: host
